<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>birilante by nuha</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
    direction: rtl;
}

header {
    background: black;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.product {
    background: white;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

button {
    background: green;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>birilante by nuha</h1>
</header>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/300">
        <h2>قلادة</h2>
        <p>150 شيكل</p>
        <button onclick="order('قلادة')">اطلب عبر واتساب</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300">
        <h2>اسوارة</h2>
        <p>150 شيكل</p>
        <button onclick="order('اسوارة')">اطلب عبر واتساب</button>
    </div>

</div>

<script>
function order(productName) {
    let phone = "972532805855"; // حطي رقمك
    let message = "مرحبا، أريد طلب " + productName;
    let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
    window.open(url, '_blank');
}
</script>

</body>
</html>
